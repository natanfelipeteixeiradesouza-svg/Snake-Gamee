<!DOCTYPE html>

<html lang="pt-br"> 
 <head>
  <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <!--
 <meta viewport>: esta tag é importante para sites que deve funcionar em dispositivos móveis. width-device -
 -->

 <title>Jogo da Cobrinha</title>

 <style>

   .container{
      text-align: center;
      background-color: #0f172a; /* fundo escuro */
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.7);
      color: #e2e8f0;
}

  .info{
        font-size: 1em;
  }

  .potuacao{
   font-weight: bold;
   color: #22c55e; /* verde destaque */
  }

  .recorde{
   font-weight: bold;
   color: #f43f5e; /* vermelho suave */
  }

  #canvas{
    border: 3px solid #22c55e;
    border-radius: 10px;
    background-color: #020617; /* fundo escuro */
    display: block;
    margin: 20px auto;
    box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.5);
  }

  .controles{
    margin-top: 20px;
  }

  button {
   font-size: 16px;
   cursor: pointer;
   background-color: #22c55e; /* verde */
   color: #022c22;
   border: none;
   padding: 8px 12px;
   border-radius: 8px;
   margin: 5px;
   transition: all 0.3s ease;
   
  }
  .teclas{
    display: grid;
    grid-template-columns: repeat(3, 50px);
    gap: 5px;
    justify-content: center;
    margin: 15px auto;
  }

  .tecla{
    width: 50px;
    height: 50px;
    background-color: #000307;
    color: #e2e8f0;
    border-radius: none;
    cursor: pointer;
    border-radius: 5px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }
  .tecla:active{
    background-color: #22c55e;
  }
   .tecla.vazio{
    background-color: transparent;
    cursor: default;
   }

  button:hover{
    background-color: #16a34a;
  }

 </style>

 </head>

 <body>
    

    <div  class="container">

    <h1>&#128013; Jogo da Cobrinha 
    </h1>  

   <div class="info">
   <div class="potuacao">
     Pontuacao: <span id="pontos"> 0 </span>
   </div>

<div class="recorde">
  Recorde: <span id="recorde"> 0 </span>
</div>

   </div>
  <canvas id="canvas" width="400" height="400">
  <!--
    <canvas> é um elemento  especial para desenho 2d ou 3d.Por si só
    é apenas um retangulo vazio. O Java Script vai usar o "contexto 2d"
    para desenhar a cobra, e comida, etc.

    nah nah nah nahnahnah hey jude!
  
  -->

  </canvas>

    <div class="controles">

      <button onclick="alert('Em construção')">Iniciar Jogo</button>
      <button >Pausar / Continuar</button>

      <div class="teclas">

         <div class="tecla vazio"></div>
         <div class="tecla">&#9650;</div>
         <div class="tecla vazio"></div>
         <div class="tecla">&#9668;</div>
         <div class="tecla">&#9660;</div>
         <div class="tecla">&#9658;</div>
         
        
      </div>
    </div>

    </div>

<script>

function iniciarJogo(){
  console.log('Jogo começou!!');
}

function pausarJogo(){
  console.log('Pausa no Jogo!!');
}


</script>

    
 </body>

</html>
